name: Strategic Review Digest

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "strategy/strategic-review.md"

concurrency:
  group: strategic-review-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  render-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      APPSTORE_DIGEST_SMTP_HOST: ${{ secrets.APPSTORE_DIGEST_SMTP_HOST }}
      APPSTORE_DIGEST_SMTP_PORT: ${{ secrets.APPSTORE_DIGEST_SMTP_PORT }}
      APPSTORE_DIGEST_SMTP_SECURITY: ${{ secrets.APPSTORE_DIGEST_SMTP_SECURITY }}
      APPSTORE_DIGEST_SMTP_USER: ${{ secrets.APPSTORE_DIGEST_SMTP_USER }}
      APPSTORE_DIGEST_SMTP_PASSWORD: ${{ secrets.APPSTORE_DIGEST_SMTP_PASSWORD }}
      APPSTORE_DIGEST_FROM: Gogo Labs Daily Business Digest <gautier@gogolabs.fr>

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Render latest digest HTML
        run: python render_latest_digest.py

      - name: Assemble latest digest HTML
        run: python assemble_latest_digest.py

      - name: Commit latest digest HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy/latest-digest.html
          if git diff --cached --quiet; then
            echo "No digest changes"
          else
            git commit -m "Render strategic review digest"
            git pull --rebase
            git push
          fi

      - name: Send postprocessed digest
        run: python send_latest_digest.py

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategic-review-digest
          path: |
            strategy/latest-digest.html
            reports/daily-digests/*.html
          if-no-files-found: ignore
          retention-days: 14
