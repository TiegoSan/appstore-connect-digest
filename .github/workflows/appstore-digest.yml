name: App Store Connect Metrics

on:
  workflow_dispatch:
  schedule:
    # Server-side dashboard refresh. GitHub cron is UTC.
    - cron: "17 * * * *"

concurrency:
  group: appstore-connect-metrics
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      APPSTORE_VENDOR_NUMBER: ${{ secrets.APPSTORE_VENDOR_NUMBER }}
      ASC_VENDOR_NUMBER: ${{ secrets.ASC_VENDOR_NUMBER }}
      APPSTORE_DIGEST_SMTP_HOST: ${{ secrets.APPSTORE_DIGEST_SMTP_HOST }}
      APPSTORE_DIGEST_SMTP_PORT: ${{ secrets.APPSTORE_DIGEST_SMTP_PORT }}
      APPSTORE_DIGEST_SMTP_SECURITY: ${{ secrets.APPSTORE_DIGEST_SMTP_SECURITY }}
      APPSTORE_DIGEST_SMTP_USER: ${{ secrets.APPSTORE_DIGEST_SMTP_USER }}
      APPSTORE_DIGEST_SMTP_PASSWORD: ${{ secrets.APPSTORE_DIGEST_SMTP_PASSWORD }}
      APPSTORE_DIGEST_FROM: Gogo Labs App Store Alerts <gautier@gogolabs.fr>
      DISABLE_ALERT_EMAIL: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set schedule context
        run: |
          echo "RUN_METRICS=true" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=Europe/Paris date +%H)" = "23" ]; then
            echo "SEND_ALERT_EMAIL=true" >> "$GITHUB_ENV"
          else
            echo "SEND_ALERT_EMAIL=false" >> "$GITHUB_ENV"
            echo "Hourly dashboard refresh: alert email suppressed outside 23:xx Europe/Paris"
          fi

      - name: Preserve previous metrics
        if: env.RUN_METRICS == 'true'
        run: |
          if [ -f strategy/latest-metrics.json ]; then
            cp strategy/latest-metrics.json /tmp/previous-metrics.json
          fi

      - name: Set up Python
        if: env.RUN_METRICS == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: env.RUN_METRICS == 'true'
        run: python -m pip install -r requirements.txt

      - name: Collect latest metrics
        if: env.RUN_METRICS == 'true'
        run: python collect_latest_metrics.py

      - name: Enrich review pipeline metrics
        if: env.RUN_METRICS == 'true'
        run: python enrich_review_metrics.py

      - name: Enrich pricing and sales metrics
        if: env.RUN_METRICS == 'true'
        run: python enrich_pricing_metrics.py

      - name: Enrich market intelligence metrics
        if: env.RUN_METRICS == 'true'
        run: python enrich_market_metrics.py

      - name: Enrich Store capabilities
        if: env.RUN_METRICS == 'true'
        run: python enrich_store_capabilities.py

      - name: Restore previous dashboard payload
        if: env.RUN_METRICS == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/nooto-dashboard
          previous_run="$(gh run list --workflow appstore-digest.yml --branch main --status success --limit 5 --json databaseId --jq '.[0].databaseId // empty')"
          if [ -n "$previous_run" ]; then
            gh run download "$previous_run" --name appstore-dashboard-payload --dir /tmp/nooto-dashboard || true
          fi

      - name: Build private dashboard payload
        if: env.RUN_METRICS == 'true'
        run: |
          if [ -f /tmp/nooto-dashboard/latest-appstore-dashboard.json ]; then
            python appstore_dashboard.py --previous-dashboard /tmp/nooto-dashboard/latest-appstore-dashboard.json
          else
            python appstore_dashboard.py
          fi

      - name: Commit enriched metrics
        if: env.RUN_METRICS == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy/latest-metrics.json
          if git diff --cached --quiet; then
            echo "No metrics changes"
          else
            git commit -m "Update latest App Store metrics"
            git pull --rebase
            git push
          fi

      - name: Upload dashboard payload artifact
        if: env.RUN_METRICS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: appstore-dashboard-payload
          path: |
            dashboard/latest-appstore-dashboard.json
            dashboard/latest-appstore-alerts.json
          if-no-files-found: error
          retention-days: 14

      - name: Send alert email
        if: env.RUN_METRICS == 'true' && env.SEND_ALERT_EMAIL == 'true' && env.DISABLE_ALERT_EMAIL != 'true'
        run: python send_appstore_alerts.py

      - name: Upload metrics artifacts
        if: env.RUN_METRICS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: appstore-metrics
          path: |
            reports/*.json
            strategy/latest-metrics.json
          if-no-files-found: ignore
          retention-days: 14
