name: App Store Connect Metrics

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These two times cover 23:50 Europe/Paris across DST.
    - cron: "50 21 * * *"
    - cron: "50 22 * * *"

concurrency:
  group: appstore-connect-metrics
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      APPSTORE_VENDOR_NUMBER: ${{ secrets.APPSTORE_VENDOR_NUMBER }}
      ASC_VENDOR_NUMBER: ${{ secrets.ASC_VENDOR_NUMBER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preserve previous metrics
        run: |
          if [ -f strategy/latest-metrics.json ]; then
            cp strategy/latest-metrics.json /tmp/previous-metrics.json
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect latest metrics
        run: python collect_latest_metrics.py

      - name: Enrich pricing and sales metrics
        run: |
          python enrich_pricing_metrics.py || echo "Pricing/sales enrichment failed; continuing metrics update"

      - name: Commit enriched metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy/latest-metrics.json
          git commit -m "Update latest App Store metrics" || echo "No metrics changes"
          git push || echo "No metrics push"

      - name: Upload metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appstore-metrics
          path: |
            reports/*.json
            strategy/latest-metrics.json
          if-no-files-found: ignore
          retention-days: 14
