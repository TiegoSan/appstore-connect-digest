name: App Store Connect Digest

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These two times cover 23:50 Europe/Paris across DST.
    # The script sends only when the current Paris hour is 23.
    - cron: "50 21 * * *"
    - cron: "50 22 * * *"

concurrency:
  group: appstore-connect-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      APPSTORE_DIGEST_SMTP_HOST: ${{ secrets.APPSTORE_DIGEST_SMTP_HOST }}
      APPSTORE_DIGEST_SMTP_PORT: ${{ secrets.APPSTORE_DIGEST_SMTP_PORT }}
      APPSTORE_DIGEST_SMTP_SECURITY: ${{ secrets.APPSTORE_DIGEST_SMTP_SECURITY }}
      APPSTORE_DIGEST_SMTP_USER: ${{ secrets.APPSTORE_DIGEST_SMTP_USER }}
      APPSTORE_DIGEST_SMTP_PASSWORD: ${{ secrets.APPSTORE_DIGEST_SMTP_PASSWORD }}
      APPSTORE_DIGEST_FROM: ${{ secrets.APPSTORE_DIGEST_FROM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate and send digest
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python enhanced_daily_appstore_digest.py --recipient gautier@gogolabs.fr --schedule-cron '${{ github.event.schedule }}'
          else
            python enhanced_daily_appstore_digest.py --recipient gautier@gogolabs.fr
          fi

      - name: Upload generated digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appstore-digest
          path: |
            reports/daily-digests/*.html
            reports/*.json
          if-no-files-found: ignore
          retention-days: 14
